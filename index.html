<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDAI-CUESTIONARIO</title>

    <style>

       form {
        background-color: black;
        width: 30%;
        height: 400px;
        border: 2px solid red;
        margin: 50px auto;
        padding: 20px;
       }

       label {
        text-transform: uppercase;
        color: white;
        font-size: 14px;
        display: block;
        margin-bottom: 5px;
       }

       input[type="text"]:focus {
        outline: none;
        border-bottom: 3px solid yellow;
       }

       button{
            background-color: #1beae9;
            color: white;
            text-transform: uppercase;
            font-size: 15px;
            border: none;
            padding: 10px;
            width: 100%;
            cursor: pointer;
            border-radius: 5px;
       }

       button:hover {
        background-color: #1aea90;
       }

    </style>
</head>
<body>
    <form>
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name= "nombre" placeholder="Ej. Chavez Bazaldua">

        <br>
        <br>

        <label for="apellido">Apellido</label>
        <input type="text" id="apellido" name="apellido" placeholder="Ej. Chavez Bazaldua">

        <br>
        <br>

        <label for="tel">Telefono</label>
        <input type="text" id="tel" name= "tel" placeholder="Ej. 8126161154">

        <br>
        <br>

        <label for="gmail">Correo</label>
        <input type="text" id="gmail" name= "gmail" placeholder="Ej. xxxx@gmail.com">

        <br>
        <br>

        <label for="coment">Comentarios</label>
        <input type="text" id="coment" name="coment">

        <br>
        <br>

        <button type="submit">Enviar Información</button>
    </form>
</body>
</html>
